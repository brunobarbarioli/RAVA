name: ministral-3-cloud
provider: ollama_cloud
model: ministral-3:3b-cloud
temperature: 0.0
max_tokens: 384
base_url: https://ollama.com/v1
api_key_env: OLLAMA_API_KEY
timeout: 90
scheduler_class: fast
retry:
  max_attempts: 4
  initial_backoff_s: 0.75
  max_backoff_s: 8.0
  taxonomies: [timeout, upstream_5xx, rate_limited, connection_error]
allow_generation_fallback: true
